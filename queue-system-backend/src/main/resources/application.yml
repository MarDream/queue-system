server:
  port: 8080
  servlet:
    context-path: /
  uri-encoding: UTF-8
  tomcat:
    uri-encoding: UTF-8

spring:
  profiles:
    active: dev
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  http:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
      force-request: true
      force-response: true

app:
  ip:                  # 部署时手动指定，留空则自动获取本机IP
  frontend:
    port: 5173
  cors:
    extra-origins:     # 额外的 CORS 允许源，逗号分隔
