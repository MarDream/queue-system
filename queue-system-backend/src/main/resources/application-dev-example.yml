spring:
  datasource:
    url: jdbc:mysql://localhost:3306/queue_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useUnicode=true&allowPublicKeyRetrieval=true
    username: root
    password: YOUR_PASSWORD_HERE
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
