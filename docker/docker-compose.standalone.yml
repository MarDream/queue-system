# 公网云独立部署模式（仅 backend）
# 适用于 MySQL、Redis、Nginx 已经在云服务器上单独运行的场景
# 在云服务器上优先执行：./build-and-up.sh [tag]

services:
  backend:
    image: queue-backend:${IMAGE_TAG}
    build:
      context: ../queue-system-backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: queue-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - ./backend/config/application-prod.yml:/app/config/application-prod.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - queue-net

networks:
  queue-net:
    driver: bridge
