# 公网云独立部署模式（仅 backend + frontend）
# 适用于 MySQL 和 Redis 已经在云服务器上单独运行的场景
# 在云服务器上执行：docker compose -f docker-compose.standalone.yml up -d --build

services:
  backend:
    image: queue-backend:latest
    build:
      context: ../queue-system-backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: queue-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./backend/config/application-prod.yml:/app/config/application-prod.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - queue-net

  frontend:
    image: queue-frontend:latest
    build:
      context: ../queue-system-frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: queue-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - queue-net

networks:
  queue-net:
    driver: bridge
