# 独立部署模式（仅 backend + frontend）
# 适用于 MySQL 和 Redis 已在外部部署的场景
# 使用方式: docker compose -f docker-compose.standalone.yml up -d

services:
  backend:
    image: docker-backend:latest
    container_name: queue-backend
    restart: unless-stopped
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://${MYSQL_HOST:-43.155.249.87}:${MYSQL_PORT:-3306}/queue_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useUnicode=true&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USERNAME:-root}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-3edc$RFV}
      - SPRING_REDIS_HOST=${REDIS_HOST:-43.155.249.87}
      - SPRING_REDIS_PORT=${REDIS_PORT:-6379}
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-3edc$RFV}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-must-be-at-least-32-chars!}
      - APP_IP=${APP_IP:-}
      - APP_FRONTEND_PORT=${FRONTEND_PORT:-80}
      - APP_CORS_ORIGINS=${APP_CORS_ORIGINS:-}
      - TZ=Asia/Shanghai
    volumes:
      - ./backend/config/application.yml:/app/config/application.yml:ro
    networks:
      - queue-net

  frontend:
    image: docker-frontend:latest
    container_name: queue-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - queue-net

networks:
  queue-net:
    driver: bridge
