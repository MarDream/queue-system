server:
  port: 8080
  servlet:
    context-path: /
  uri-encoding: UTF-8
  tomcat:
    uri-encoding: UTF-8

spring:
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/queue_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&useUnicode=true&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: host.docker.internal
      port: 6379
      password:
      database: 0

  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  http:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
      force-request: true
      force-response: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

queue:
  config:
    avg-service-minutes: 3
    ticket-number-padding: 3

jwt:
  secret: change-me-in-production-must-be-at-least-32-chars!
  expiration: 86400000

app:
  ip: 43.155.249.87
  frontend:
    port: 80
  cors:
    extra-origins:
